# F Prime C++ Dependencies
CONFIG_CPP=y
CONFIG_NEWLIB_LIBC=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_CPP_EXCEPTIONS=n
CONFIG_CPP_RTTI=n
CONFIG_COMMON_LIBC_MALLOC=y
CONFIG_MAIN_STACK_SIZE=8192
#CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=183560
CONFIG_REBOOT=y

# Fix time based posix apis
CONFIG_POSIX_API=y

# Native USB (From NUCLEO H723ZG's USB definitions)
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
CONFIG_UART_INTERRUPT_DRIVEN=y 

#  From NUCLEO H723ZG's USB definitions
CONFIG_USB_DEVICE_VID=0x0483
CONFIG_USB_DEVICE_PID=0x374E

# Serial and I/O
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_ASYNC_API=y
CONFIG_SERIAL=y
CONFIG_GPIO=y
CONFIG_PWM=n
CONFIG_I2C=n
CONFIG_SPI=n
CONFIG_PINCTRL=y
CONFIG_ASSERT=y

# Enable floating-point units (FPUs)
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# Memory Management & Threading (Required for k_malloc)
CONFIG_DYNAMIC_THREAD=y
CONFIG_KERNEL_MEM_POOL=y
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_DYNAMIC_THREAD_STACK_SIZE=8192
CONFIG_DYNAMIC_THREAD_ALLOC=y
CONFIG_DYNAMIC_THREAD_PREFER_ALLOC=y
CONFIG_DYNAMIC_THREAD_PREFER_POOL=n
CONFIG_MAIN_THREAD_PRIORITY=14

# Ring Buffer
CONFIG_RING_BUFFER=y

# File System (Required for Fw::FileManager)
CONFIG_FILE_SYSTEM=y

# Note: You may also need a backend file system depending on your hardware
# CONFIG_FILE_SYSTEM_LITTLEFS=y
# CONFIG_FLASH=y
# CONFIG_FLASH_MAP=y
# CONFIG_FLASH_PAGE_LAYOUT=y